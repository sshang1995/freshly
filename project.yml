name: ExpiredItem
options:
  bundleIdPrefix: com.yourname
  developmentRegion: en
  deploymentTarget:
    iOS: "17.0"
targets:
  ExpiredItem:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpiredItem
    info:
      path: ExpiredItem/Info.plist
      properties:
        CFBundleDisplayName: Freshly
        NSUserNotificationUsageDescription: "Freshly reminds you before items expire."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.shushang.freshly
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ExpiredItem/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
